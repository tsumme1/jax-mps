name: Remove "awaiting info" label on response

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  remove-label:
    runs-on: ubuntu-latest
    if: >-
      github.actor != 'tillahoffmann'
      && github.actor != 'copilot-pull-request-reviewer[bot]'
      && github.actor != 'github-actions[bot]'
    steps:
      - name: Remove "awaiting info" label
        uses: actions/github-script@v7
        with:
          script: |
            const number = context.issue?.number || context.payload.pull_request?.number;
            if (!number) return;
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                name: 'awaiting info',
              });
            } catch (e) {
              if (e.status !== 404) throw e;  // label wasn't present
            }
